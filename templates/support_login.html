<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Support Team Login - NearNest</title>
  <link rel="stylesheet" href="/static/login_dashboard.css" />
</head>
<body>

<header class="header">
  <div class="top-nav">
    <a href="/about">About</a>
    <a href="/contact">Contact Us</a>
  </div>
  <div class="container">
    <img src="/static/icons/logo.png.png" alt="Logo" class="site-logo-left" width="500" height="500">
    <h1>NearNest</h1>
    <p>Find the perfect store for your needs!</p>
  </div>
</header>

<main>
  <div class="login-container">
    <h2>Support Team Login</h2>
    <form method="POST" action="{{ url_for('support_login') }}">
      <input type="text" name="email" placeholder="Support Email" required><br>
      <input type="password" name="password" placeholder="Password" required><br>
      <button type="submit">Login</button>
    </form>

    {% if error %}
    <p style="color: red; margin-top: 10px;">{{ error }}</p>
    {% endif %}
  </div>
</main>

</body>
</html>
