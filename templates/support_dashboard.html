<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Support Dashboard - NearNest</title>
  <link rel="stylesheet" href="/static/support_dashboard.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <img src="/static/icons/logo.png.png" alt="Logo" class="site-logo-left" width="100" height="100" />
    <h1>Support Dashboard</h1>
    <a href="/logout" class="logout-btn">Logout</a>
  </header>

  <!-- Cards Section -->
  <section class="overview-cards">
    <div class="card" style="border-left-color: #ff6b6b;">
      <h3>Open Queries</h3>
      <p>{{ open_count }}</p>
    </div>
    <div class="card" style="border-left-color: #f0ad4e;">
      <h3>In Progress</h3>
      <p>{{ in_progress_count }}</p>
    </div>
    <div class="card" style="border-left-color: #5cb85c;">
      <h3>Resolved</h3>
      <p>{{ resolved_count }}</p>
    </div>
    <div class="card" style="border-left-color: #5bc0de;">
    <h3>Total Queries</h3>
    <p>{{ open_count + in_progress_count + resolved_count }}</p>
  </div>
  </section>


<!-- View All Queries Button -->
<div style="text-align: center; margin-top: 20px;">
  <form action="{{ url_for('view_queries') }}" method="get">
    <button type="submit" class="query-btn">View All Queries</button>
  </form>
</div>

  

  <!-- Raise Query Form -->
  <section class="raise-query-form">
    <h2 style="text-align: center;">Raise New Query</h2>
    <form method="POST" action="{{ url_for('support_dashboard') }}">
      <label>Registered Business Name:</label>
      <input type="text" name="business_name" required />

      <label>Registered Owner Name:</label>
      <input type="text" name="owner_name" required />

      <label>Registered Business Email:</label>
      <input type="email" name="owner_email" placeholder="Owner Email" required />

      <label>Registered Contact Number:</label>
      <input type="text" name="owner_contact" placeholder="Owner Contact" required />

      <label>Problem Description:</label>
      <textarea name="problem" rows="5" required></textarea>

      <div class="radio-group custom-radio-group">
        <label class="custom-radio">
          <input type="radio" name="status" value="Open" required />
          <span class="radio-btn"><i></i>Open</span>
        </label>
        <label class="custom-radio">
          <input type="radio" name="status" value="In Progress" />
          <span class="radio-btn"><i></i>In Progress</span>
        </label>
        <label class="custom-radio">
          <input type="radio" name="status" value="Resolved" />
          <span class="radio-btn"><i></i>Resolved</span>
        </label>
      </div>

      <br><br>
      <div style="text-align: center;">
        <button type="submit">Submit Query</button>
      </div>
    </form>
  </section>

  {% if success %}
  <script>
    alert("Query Raised Successfully!");
  </script>
  {% endif %}

</body>
</html>
