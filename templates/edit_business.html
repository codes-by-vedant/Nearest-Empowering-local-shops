<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Business - NearNest</title>
    <link rel="stylesheet" href="/static/edit_business.css">
</head>
<body>
    <header class="header">
        <div class="top-nav">
            <a href="{{ url_for('about') }}">About</a>
            <a href="{{ url_for('contact') }}">Contact Us</a>
        </div>
        <div class="container">
            <img src="/static/icons/logo.png.png" alt="Logo" class="site-logo-left" width="500" height="500">
            <h1>NearNest</h1>
            <p>Edit your business details below</p>
        </div>
    </header>

    <main>
        <div class="form-container">
            <h2>Edit Business Details</h2>
            <form method="POST" action="{{ url_for('edit_business', id=business['id']) }}">

                {% if request.args.get('query_id') %}
                     <input type="hidden" name="query_id" value="{{ request.args.get('query_id') }}">
                {% endif %}


                <label for="name">Business Name</label>
                <input type="text" id="name" name="name" value="{{ business['name'] }}" required>

                <label for="category">Category</label>
                <input type="text" id="category" name="category" value="{{ business['category'] }}" required>

                <label for="area">Area</label>
                <input type="text" id="area" name="area" value="{{ business['area'] }}" required>

                <label for="address">Address</label>
                <textarea id="address" name="address" required>{{ business['address'] }}</textarea>

                <label for="contact">Contact Number</label>
                <input type="tel" id="contact" name="contact" value="{{ business['contact'] }}" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ business['email'] }}" required>

                <label for="start_time">Opening Time</label>
                <input type="time" id="start_time" name="start_time" value="{{ business['hours'].split(' to ')[0] }}" required>

                <label for="end_time">Closing Time</label>
                <input type="time" id="end_time" name="end_time" value="{{ business['hours'].split(' to ')[1] }}" required>

                <label for="description">Description</label>
                <textarea id="description" name="description" required>{{ business['description'] }}</textarea>

                <label for="map_link">Google Maps Embed Link (iframe src only)</label>
                <input type="text" id="map_link" name="map_link" value="{{ business['map_link'] }}" required>

                <button type="submit">Update Business</button>

                


            </form>
            <br>
            <a href="{{ url_for('modify_business') }}" class="btn">← Back to Modify Page</a>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2025 NearNest Store Locator | Built with ❤️ in Pune</p>
    </footer>
</body>
</html>
